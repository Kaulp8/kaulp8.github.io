<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Strike Calculator & Data</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Custom styles just for the budget app */
        .app-container {
            max-width: 400px; 
            margin: 40px auto; 
            padding: 30px; 
            border: 2px solid #2980b9; 
            border-radius: 12px; 
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .app-container input {
            width: 100%; 
            padding: 10px; 
            margin: 10px 0 20px 0; 
            box-sizing: border-box;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .app-container button {
            width: 100%; 
            padding: 12px; 
            background-color: #27ae60; 
            color: white; 
            border: none; 
            border-radius: 6px;
            cursor: pointer; 
            font-size: 16px;
            font-weight: bold;
        }
        .app-container button:hover {
            background-color: #219653;
        }
    </style>
</head>
<body>

<div class="nav">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="resume.html">Resume</a>
    <a href="app.html">Strike Calculator</a>
    <a href="contact.html">Contact</a>
</div>

<div class="app-container">
    <h2 style="margin-top: 0; text-align: center;">Strike Mission Budget</h2>
    <p style="text-align: center; color: #64748b;">Enter your costs to see if this trip is a "Go"!</p>
    
    <label style="font-weight: 600;">Flight Cost ($):</label>
    <input type="number" id="flight" placeholder="e.g. 450">
    
    <label style="font-weight: 600;">Board Bag Fee ($):</label>
    <input type="number" id="bags" placeholder="e.g. 50">
    
    <button onclick="calculateTotal()">Check Budget</button>
    <h3 id="result" style="text-align: center; margin-bottom: 0;"></h3>
</div>

<div class="box" id="tableau-section">
    <h2>Data Analytics</h2>
    <p>Use the chart below to track South Swell frequency directed at Costa Rica.</p>
    
    <div class='tableauPlaceholder' id='viz1776280752185' style='position: relative'>
        <noscript>
            <a href='#'><img alt='Sheet 1 ' src='https:&#47;&#47;public.tableau.com&#47;static&#47;images&#47;Co&#47;CostaSouthSwell&#47;Sheet1&#47;1_rss.png' style='border: none' /></a>
        </noscript>
        <object class='tableauViz' style='display:none;'>
            <param name='host_url' value='https%3A%2F%2Fpublic.tableau.com%2F' /> 
            <param name='embed_code_version' value='3' />

            <param name='tabs' value='no' />
            <param name='toolbar' value='yes' />

            <param name='animate_transition' value='yes' />
            <param name='display_static_image' value='yes' />
            <param name='display_spinner' value='yes' />
            <param name='display_overlay' value='yes' />

</div>

<script>
    function calculateTotal() {
        var flight = parseFloat(document.getElementById('flight').value) || 0;
        var bags = parseFloat(document.getElementById('bags').value) || 0;
        var total = flight + bags;
        var resultText = "Total: $" + total;
        
        if (total <= 500) {
            document.getElementById('result').innerHTML = resultText + " - STRIKE MISSION GO! 🏄‍♂️";
            document.getElementById('result').style.color = "green";
        } else {
            document.getElementById('result').innerHTML = resultText + " - Over budget. Keep hunting.";
            document.getElementById('result').style.color = "red";
        }
    }
</script>
<div style="text-align: center; padding-bottom: 20px;">
    <p style="color: #64748b; font-size: 14px;">Joseph McKaul Packer</p>
</div>
</body>
</html>
